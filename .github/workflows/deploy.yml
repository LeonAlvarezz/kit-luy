name: Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy Worker
        run: bun run deploy

      - name: Register Telegram webhook
        run: |
          set -euo pipefail
          RESPONSE=$(curl --fail --show-error --silent --max-time 30 \
            --header "X-Webhook-Secret: ${TELEGRAM_BOT_TOKEN}" \
            "${PUBLIC_BASE_URL%/}/telegram/setup")
          echo "Webhook registration response: ${RESPONSE}"
